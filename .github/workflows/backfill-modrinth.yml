name: Backfill Modrinth releases

on:
  workflow_dispatch:
  push:
    tags:
      - 'backfill-modrinth-*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}

    steps:
      - name: Download and publish missing releases
        run: |
          set -euo pipefail
          test -n "$MODRINTH_TOKEN"
          tags=(
            mc1.21.3-1.0.0
            mc1.21.4-1.0.0
            mc1.21.5-1.0.0
            mc1.21.6-1.0.0
            mc1.21.7-1.0.0
            mc1.21.8-1.0.0
            mc1.21.9-1.0.0
            mc1.21.10-1.0.0
            mc1.21.11-1.0.0
            mc26.1-1.0.0
            mc26.1.1-1.0.0
            mc26.1.2-1.0.0
            mc26.2-1.0.0
          )
          modrinth_project_id=CiW3JzIW
          existing_versions=$(curl --fail --silent --show-error \
            -H 'User-Agent: Nie1iX/movewand-release-workflow' \
            -H "Authorization: ${MODRINTH_TOKEN}" \
            "https://api.modrinth.com/v2/project/${modrinth_project_id}/version?include_changelog=false")

          publish() {
            local tag="$1"
            local loader="$2"
            local artifact="$3"
            local minecraft_version="$4"
            local mod_version="$5"
            local dependencies="$6"
            local version="${mod_version}+mc${minecraft_version}-${loader}"
            local metadata

            if jq -e --arg version "$version" 'any(.[]; .version_number == $version)' \
              <<<"$existing_versions" >/dev/null; then
              echo "Skipping existing Modrinth version: $version"
              return
            fi

            metadata=$(jq -cn \
              --arg name "MoveWand ${mod_version}+mc${minecraft_version} (${loader})" \
              --arg version "$version" \
              --arg changelog "See https://github.com/${GITHUB_REPOSITORY}/releases/tag/${tag}" \
              --arg minecraft_version "$minecraft_version" \
              --arg loader "$loader" \
              --arg project_id "$modrinth_project_id" \
              --argjson dependencies "$dependencies" \
              '{name: $name, version_number: $version, changelog: $changelog, dependencies: $dependencies, game_versions: [$minecraft_version], version_type: "release", loaders: [$loader], featured: false, project_id: $project_id, file_parts: ["file"], primary_file: "file", environment: "client_and_server"}')
            curl --fail --silent --show-error --request POST https://api.modrinth.com/v2/version \
              -H 'User-Agent: Nie1iX/movewand-release-workflow' \
              -H "Authorization: ${MODRINTH_TOKEN}" \
              -F "data=${metadata};type=application/json" \
              -F "file=@${artifact}"
            existing_versions=$(jq --arg version "$version" '. + [{version_number: $version}]' \
              <<<"$existing_versions")
          }

          for tag in "${tags[@]}"; do
            minecraft_version=${tag#mc}
            minecraft_version=${minecraft_version%%-*}
            mod_version=${tag#mc${minecraft_version}-}
            artifact_dir="artifacts/${tag}"
            mkdir -p "$artifact_dir"
            gh release download "$tag" --dir "$artifact_dir" \
              --pattern '*-fabric-*.jar' --pattern '*-neoforge-*.jar'

            fabric_jars=("$artifact_dir"/*-fabric-*.jar)
            neoforge_jars=("$artifact_dir"/*-neoforge-*.jar)
            test "${#fabric_jars[@]}" -eq 1
            test "${#neoforge_jars[@]}" -eq 1
            test -f "${fabric_jars[0]}"
            test -f "${neoforge_jars[0]}"
            publish "$tag" fabric "${fabric_jars[0]}" "$minecraft_version" "$mod_version" \
              '[{"project_id":"P7dR8mSH","dependency_type":"required"}]'
            publish "$tag" neoforge "${neoforge_jars[0]}" "$minecraft_version" "$mod_version" '[]'
          done
