name: Addons

on:
  push:
    branches: [main, 26.2]
    paths:
      - 'addons/**'
      - 'common/src/main/java/io/github/nie1ix/movewand/move/engine/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      - '.github/workflows/addons.yml'
  pull_request:
    branches: [main, 26.2]
    paths:
      - 'addons/**'
      - 'common/src/main/java/io/github/nie1ix/movewand/move/engine/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      - '.github/workflows/addons.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect add-on projects
        id: addons
        shell: bash
        run: |
          if grep -q "include 'addons:" settings.gradle; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No add-on projects are configured for this Minecraft line."
          fi

      - uses: actions/setup-java@v4
        if: steps.addons.outputs.available == 'true'
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Build and test add-ons
        if: steps.addons.outputs.available == 'true'
        run: ./gradlew buildAddons :addons:oritech:fabric:runGameTest --no-daemon --max-workers=1 --console=plain

      - name: Upload add-on JARs
        if: steps.addons.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: movewand-addons-${{ github.ref_name }}
          path: |
            build/addons/*.jar
            !build/addons/*-sources.jar
          if-no-files-found: error
