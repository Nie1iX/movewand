name: Release

on:
  push:
    tags:
      - 'mc*-*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build loader variants
        run: ./gradlew :fabric:build :neoforge:assemble --no-daemon --max-workers=1 --console=plain

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=()
          for artifact in build/mods/*.jar; do
            [[ "$artifact" == *-sources.jar ]] || assets+=("$artifact")
          done
          test "${#assets[@]}" -eq 2
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" --title "MoveWand $GITHUB_REF_NAME" --generate-notes
          fi

      - name: Publish loader variants to Modrinth
        if: ${{ secrets.MODRINTH_TOKEN != '' }}
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          minecraft_version=$(perl -ne 'print $1 if /^minecraft_version=(.+)$/' gradle.properties)
          mod_version=$(perl -ne 'print $1 if /^mod_version=(.+)$/' gradle.properties)
          changelog="See https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"

          publish() {
            local loader="$1"
            local artifact="$2"
            local dependencies="$3"
            local metadata
            metadata=$(jq -cn \
              --arg name "MoveWand ${mod_version}+mc${minecraft_version} (${loader})" \
              --arg version "${mod_version}+mc${minecraft_version}-${loader}" \
              --arg changelog "$changelog" \
              --arg minecraft_version "$minecraft_version" \
              --arg loader "$loader" \
              --argjson dependencies "$dependencies" \
              '{name: $name, version_number: $version, changelog: $changelog, dependencies: $dependencies, game_versions: [$minecraft_version], version_type: "release", loaders: [$loader], project_id: "movewand", file_parts: ["file"], primary_file: "file", environment: "client_and_server"}')
            curl --fail --silent --show-error --request POST https://api.modrinth.com/v2/version \
              -H "Authorization: ${MODRINTH_TOKEN}" \
              -F "data=${metadata};type=application/json" \
              -F "file=@${artifact}"
          }

          fabric_jar=$(perl -e 'print for grep { !/-sources\.jar$/ } glob "build/mods/*-fabric-*.jar"')
          neoforge_jar=$(perl -e 'print for grep { !/-sources\.jar$/ } glob "build/mods/*-neoforge-*.jar"')
          test -f "$fabric_jar"
          test -f "$neoforge_jar"
          publish fabric "$fabric_jar" '[{"project_id":"fabric-api","dependency_type":"required"}]'
          publish neoforge "$neoforge_jar" '[]'

      - name: Publish loader variants to CurseForge
        if: ${{ secrets.CURSEFORGE_TOKEN != '' }}
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: |
          minecraft_version=$(perl -ne 'print $1 if /^minecraft_version=(.+)$/' gradle.properties)
          mod_version=$(perl -ne 'print $1 if /^mod_version=(.+)$/' gradle.properties)
          changelog="See https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"

          publish() {
            local loader="$1"
            local artifact="$2"
            local metadata
            metadata=$(jq -cn \
              --arg display_name "MoveWand ${mod_version}+mc${minecraft_version} (${loader})" \
              --arg changelog "$changelog" \
              --arg minecraft_version "$minecraft_version" \
              --arg loader "$loader" \
              '{displayName: $display_name, changelog: $changelog, changelogType: "markdown", gameVersionNames: ["Client", "Server", $minecraft_version, $loader], releaseType: "release"}')
            curl --fail --silent --show-error --request POST \
              "https://minecraft.curseforge.com/api/projects/1616499/upload-file" \
              -H "X-Api-Token: ${CURSEFORGE_TOKEN}" \
              -F "metadata=${metadata};type=application/json" \
              -F "file=@${artifact}"
          }

          fabric_jar=$(perl -e 'print for grep { !/-sources\.jar$/ } glob "build/mods/*-fabric-*.jar"')
          neoforge_jar=$(perl -e 'print for grep { !/-sources\.jar$/ } glob "build/mods/*-neoforge-*.jar"')
          test -f "$fabric_jar"
          test -f "$neoforge_jar"
          publish Fabric "$fabric_jar"
          publish NeoForge "$neoforge_jar"
