name: Build

on:
  push:
    branches: [1.21.7]
  pull_request:
    branches: [1.21.7]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build Fabric and NeoForge
        run: ./gradlew build --no-daemon --max-workers=1 --console=plain

      - name: Run NeoForge GameTests
        run: ./gradlew :neoforge:runGameTestServer --no-daemon --max-workers=1 --console=plain

      - name: Upload mod JARs
        uses: actions/upload-artifact@v4
        with:
          name: movewand-mc1.21.7
          path: |
            build/mods/*-fabric-*.jar
            build/mods/*-neoforge-*.jar
            !build/mods/*-sources.jar
          if-no-files-found: error
